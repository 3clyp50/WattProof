services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      CODEX_BINARY: "/usr/local/bin/codex"
      WATTPROOF_SECURE_COOKIES: "1"
      WATTPROOF_SESSION_SECRET: "${WATTPROOF_SESSION_SECRET:-}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    tmpfs:
      - /tmp:size=256m,mode=1777
